; =============================================================================
; Meshtastic variant: CrowPanel DIS05020A v1.1
; Auto-loaded by root platformio.ini via: extra_configs = variants/*/*.ini
; =============================================================================

[env:crowpanel-dis05020a-v11]
extends = esp32s3_base
board = esp32-s3-devkitc-1
custom_meshtastic_app_partition = ota_1
custom_meshtastic_fs_partition = mtdata

board_build.flash_mode            = qio
board_build.f_flash               = 80000000L
board_upload.flash_size           = 16MB
board_upload.offset_address       = 0x660000
board_upload.maximum_size         = 5570560
board_build.arduino.memory_type   = qio_opi
board_build.partitions            = partitions_dualboot_16MB.csv
board_build.app_partition_name    = ota_1

; Point to our variant folder
board_build.variants_dir = ${PROJECT_DIR}/variants
board_build.variant      = crowpanel_dis05020a_v11

upload_speed  = 921600
monitor_speed = 115200

build_unflags =
  -flto
  -std=c++11
  -std=gnu++11

build_flags =
  ${esp32s3_base.build_flags}
  -std=gnu++17
  -fno-lto
  -DBOARD_HAS_PSRAM
  -DPRIVATE_HW
  -DCROWPANEL_RETURN_TO_BOOT_SELECTOR=1
  ;
  ; ---- SX1262 radio ----
  -DUSE_SX1262
  -DLORA_SCK=5
  -DLORA_MISO=4
  -DLORA_MOSI=6
  -DSX126X_CS=8
  -DSX126X_DIO1=20
  -DSX126X_RESET=19
  -DSX126X_BUSY=2
  -DSX126X_DIO2_AS_RF_SWITCH=true
  ;
  ; ---- Display: OFF for Meshtastic's built-in screen system ----
  ; (RGB parallel panels are not supported by TFTDisplay)
  ; Our crowpanel_display.cpp handles display directly via LovyanGFX
  -DHAS_SCREEN=0
  -DHAS_TFT=0
  -DHAS_TOUCHSCREEN=0
  -DI2C_SDA=15
  -DI2C_SCL=16
  ;
  ; ---- No GPS, no battery ----
  -DHAS_GPS=0
  -DGPS_RX_PIN=-1
  -DGPS_TX_PIN=-1
  -DBATTERY_PIN=-1
  ;
  ; ---- No button / LED ----
  -DBUTTON_PIN=-1
  -DLED_PIN=-1

lib_deps =
  ${esp32s3_base.lib_deps}
  file://lib/LovyanGFX
