[crowpanel_base]
extends = esp32s3_base
board = crowpanel
board_check = true
upload_protocol = esptool
board_build.partitions = default_16MB.csv

build_unflags =
  -flto
  -std=c++11
  -std=gnu++11

build_flags = ${esp32s3_base.build_flags} -Os -std=gnu++17 -fno-lto
  -I variants/esp32s3/elecrow_panel
  -D ELECROW_PANEL
  -D CONFIG_ARDUHAL_LOG_COLORS
  -D RADIOLIB_DEBUG_SPI=0
  -D RADIOLIB_DEBUG_PROTOCOL=0
  -D RADIOLIB_DEBUG_BASIC=0
  -D RADIOLIB_VERBOSE_ASSERT=0
  -D RADIOLIB_SPI_PARANOID=0
  -D MESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  -D MESHTASTIC_EXCLUDE_INPUTBROKER=1
  -D MESHTASTIC_EXCLUDE_SERIAL=1
  -D MESHTASTIC_EXCLUDE_SOCKETAPI=1
  -D MESHTASTIC_EXCLUDE_SCREEN=1
  -D CONFIG_DISABLE_HAL_LOCKS=1
  -D HAS_SCREEN=0
  -D HAS_TFT=1
  -D RAM_SIZE=6144
  -D LV_LVGL_H_INCLUDE_SIMPLE
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_COMP_CONF_INCLUDE_SIMPLE
  -D LV_USE_SYSMON=0
  -D LV_USE_PROFILER=0
  -D LV_USE_PERF_MONITOR=0
  -D LV_USE_MEM_MONITOR=0
  -D LV_USE_LOG=0
  -D LV_BUILD_TEST=0
  -D LV_USE_NEON=0
  -D LV_USE_HELIUM=0
  -D USE_LOG_DEBUG
  -D LOG_DEBUG_INC=\"DebugConfiguration.h\"
  -D USE_PACKET_API
  -D HAS_SDCARD
  -D SD_SPI_FREQUENCY=75000000

lib_deps = ${esp32s3_base.lib_deps}
  ${device-ui_base.lib_deps}
  https://github.com/meshtastic/ESP8266Audio/archive/343024632ee78d6216907b2353fc943a62422d80.zip
  earlephilhower/ESP8266SAM@1.1.0
  hideakitai/TCA9534@0.1.1
  ; PCF8563 RTC (on-board 0x51) — used by mcui to persist the NTP-synced UTC
  ; epoch across reboots so we only need to hit the internet for time once.
  lewisxhe/PCF8563_Library@1.0.1
  file://lib/LovyanGFX

[crowpanel_small_esp32s3_base] ; 2.4, 2.8, 3.5 inch
extends = crowpanel_base
build_flags =
  ${crowpanel_base.build_flags}
  -D CROW_SELECT=1
  -D SDCARD_USE_SOFT_SPI
  -D SDCARD_CS=7
  -D SPI_DRIVER_SELECT=2
  -D LGFX_DRIVER_TEMPLATE
  -D LGFX_DRIVER=LGFX_GENERIC
  -D GFX_DRIVER_INC=\"graphics/LGFX/LGFX_GENERIC.h\"
  -D VIEW_320x240
  -D MAP_FULL_REDRAW

[crowpanel_large_esp32s3_base] ; 4.3, 5.0, 7.0 inch
extends = crowpanel_base
build_flags =
  ${crowpanel_base.build_flags}
  -D CROW_SELECT=2
  -D SDCARD_CS=7
  -D LGFX_DRIVER=LGFX_ELECROW70
  -D GFX_DRIVER_INC=\"graphics/LGFX/LGFX_ELECROW70.h\"
  -D DISPLAY_SET_RESOLUTION

[env:elecrow-adv-24-28-tft]
custom_meshtastic_hw_model = 97
custom_meshtastic_hw_model_slug = CROWPANEL
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Crowpanel Adv 2.4/2.8 TFT
custom_meshtastic_images = crowpanel_2_4.svg, crowpanel_2_8.svg
custom_meshtastic_tags = Elecrow
custom_meshtastic_requires_dfu = true
custom_meshtastic_partition_scheme = 16MB

extends = crowpanel_small_esp32s3_base
build_flags =
  ${crowpanel_small_esp32s3_base.build_flags}
  -D SPI_FREQUENCY=80000000
  -D LGFX_SCREEN_WIDTH=240
  -D LGFX_SCREEN_HEIGHT=320
  -D DISPLAY_SIZE=320x240
  -D LGFX_PANEL=ST7789
  -D LGFX_ROTATION=1
  -D LGFX_CFG_HOST=SPI2_HOST
  -D LGFX_PIN_SCK=42
  -D LGFX_PIN_MOSI=39
  -D LGFX_PIN_DC=41
  -D LGFX_PIN_CS=40
  -D LGFX_PIN_BL=38
  -D LGFX_TOUCH=FT5x06
  -D LGFX_TOUCH_I2C_ADDR=0x38
  -D LGFX_TOUCH_I2C_SDA=15
  -D LGFX_TOUCH_I2C_SCL=16
  -D LGFX_TOUCH_INT=47
  -D LGFX_TOUCH_RST=48
  -D LGFX_TOUCH_ROTATION=0

[env:elecrow-adv-35-tft]
custom_meshtastic_hw_model = 97
custom_meshtastic_hw_model_slug = CROWPANEL
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Crowpanel Adv 3.5 TFT
custom_meshtastic_images = crowpanel_3_5.svg
custom_meshtastic_tags = Elecrow
custom_meshtastic_requires_dfu = true
custom_meshtastic_partition_scheme = 16MB

extends = crowpanel_small_esp32s3_base
board_level = pr
build_flags =
  ${crowpanel_small_esp32s3_base.build_flags}
  -D LV_CACHE_DEF_SIZE=2097152
  -D SPI_FREQUENCY=60000000
  -D LGFX_SCREEN_WIDTH=320
  -D LGFX_SCREEN_HEIGHT=480
  -D DISPLAY_SIZE=320x480
  -D LGFX_PANEL=ILI9488
  -D LGFX_ROTATION=0
  -D LGFX_CFG_HOST=SPI2_HOST
  -D LGFX_PIN_SCK=42
  -D LGFX_PIN_MOSI=39
  -D LGFX_PIN_DC=41
  -D LGFX_PIN_CS=40
  -D LGFX_PIN_BL=38
  -D LGFX_TOUCH=GT911
  -D LGFX_TOUCH_I2C_ADDR=0x5D
  -D LGFX_TOUCH_I2C_SDA=15
  -D LGFX_TOUCH_I2C_SCL=16
  -D LGFX_TOUCH_INT=47
  -D LGFX_TOUCH_RST=48
  -D LGFX_TOUCH_ROTATION=0
  -D DISPLAY_SET_RESOLUTION

; 4.3, 5.0, 7.0 inch 800x480 IPS (V1) — DIS05020A v1.1 uses LORA_CS=8
[env:elecrow-adv1-43-50-70-tft]
custom_meshtastic_hw_model = 97
custom_meshtastic_hw_model_slug = CROWPANEL
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Crowpanel Adv 4.3/5.0/7.0 TFT
custom_meshtastic_images = crowpanel_5_0.svg, crowpanel_7_0.svg
custom_meshtastic_tags = Elecrow
custom_meshtastic_requires_dfu = true
custom_meshtastic_partition_scheme = 16MB-dualboot
custom_meshtastic_app_partition = ota_1
custom_meshtastic_fs_partition = mtdata

extends = crowpanel_large_esp32s3_base
board_build.partitions = partitions_dualboot_16MB.csv
board_build.app_partition_name = ota_1
board_upload.offset_address = 0x660000
board_upload.maximum_size = 5570560

build_unflags =
  -flto
  -std=c++11
  -std=gnu++11

build_flags =
  ${crowpanel_large_esp32s3_base.build_flags}
  -std=gnu++17
  -fno-lto
  -D VIEW_320x240
  -D DISPLAY_SIZE=800x480
  -D USE_MCUI=1
  -D MCUI_PORTRAIT=1
  -D DEFAULT_SCREEN_ON_SECS=30
  -D CROWPANEL_RETURN_TO_BOOT_SELECTOR=1
